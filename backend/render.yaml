services:
  - type: web
    name: mijichat-backend
    env: python
    buildCommand: pip install -r requirements.txt --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GIPHY_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
