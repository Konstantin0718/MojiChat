services:
  - type: web
    name: mojichat-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: mojichat_db
      - key: JWT_SECRET
        generateValue: true
      - key: GIPHY_API_KEY
        sync: false
      - key: EMERGENT_LLM_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
